<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客系统设计预览</title>
    <style>
        :root {
            --sidebar-bg: #1e2a3a;
            --sidebar-text: #c8d6e5;
            --sidebar-hover: #2d3f55;
            --sidebar-active: #3498db;
            --sidebar-active-bg: rgba(52, 152, 219, 0.15);
            --header-bg: #ffffff;
            --header-border: #e8ecf0;
            --body-bg: #f4f6f9;
            --card-bg: #ffffff;
            --card-border: #e8ecf0;
            --text-primary: #2c3e50;
            --text-secondary: #7f8c8d;
            --accent: #3498db;
            --accent-hover: #2980b9;
            --danger: #e74c3c;
            --danger-hover: #c0392b;
            --success: #27ae60;
            --warning: #f39c12;
            --input-border: #dde3ea;
            --input-focus: #3498db;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            font-size: 14px;
            color: var(--text-primary);
            background: var(--body-bg);
            height: 100vh;
            overflow: hidden;
        }

        .admin-layout {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 220px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-logo {
            padding: 20px 20px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .sidebar-logo h1 {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            line-height: 1.3;
        }

        .sidebar-logo p {
            font-size: 12px;
            color: rgba(200,214,229,0.6);
            margin-top: 2px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 12px 0;
        }

        .nav-section-label {
            padding: 8px 20px 4px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(200,214,229,0.4);
            font-weight: 600;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            color: var(--sidebar-text);
            font-size: 14px;
            transition: background 0.15s, color 0.15s;
            cursor: pointer;
        }

        .nav-item:hover {
            background: var(--sidebar-hover);
            color: #fff;
        }

        .nav-item.active {
            background: var(--sidebar-active-bg);
            color: var(--sidebar-active);
            font-weight: 500;
            border-right: 3px solid var(--sidebar-active);
        }

        .nav-item .icon {
            width: 18px;
            text-align: center;
            font-size: 16px;
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-header {
            height: 56px;
            background: var(--header-bg);
            border-bottom: 1px solid var(--header-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            box-shadow: var(--shadow);
        }

        .page-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--card-border);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            transition: all 0.15s;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: #f0f3f6;
            color: var(--text-primary);
            border: 1px solid var(--card-border);
        }

        .btn-secondary:hover {
            background: #e3e8ee;
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
        }

        .btn-danger:hover {
            background: var(--danger-hover);
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
        }

        .search-filter {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .form-control {
            padding: 9px 12px;
            border: 1px solid var(--input-border);
            border-radius: 6px;
            font-size: 14px;
            color: var(--text-primary);
            background: #fff;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(52,152,219,0.12);
        }

        .form-select {
            padding: 9px 12px;
            border: 1px solid var(--input-border);
            border-radius: 6px;
            font-size: 14px;
            color: var(--text-primary);
            background: #fff;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--card-border);
            font-size: 14px;
        }

        th {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: #f8fafc;
        }

        tr:hover td {
            background: #f8fafc;
        }

        .td-actions {
            display: flex;
            gap: 8px;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-blue {
            background: rgba(52,152,219,0.12);
            color: var(--accent);
        }

        .badge-gray {
            background: #f0f3f6;
            color: var(--text-secondary);
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .status-dot.success {
            background: var(--success);
        }

        .status-dot.warning {
            background: var(--warning);
        }

        .status-dot.error {
            background: var(--danger);
        }

        .pagination {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
            justify-content: flex-end;
        }

        .pagination-info {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .pagination-btn {
            padding: 6px 12px;
            border: 1px solid var(--card-border);
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .pagination-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .batch-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            align-items: center;
        }

        .checkbox {
            margin-right: 8px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            padding-right: 32px;
            width: 300px;
        }

        .search-box .search-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <h1>Dreamers'Blog</h1>
                <p>管理后台</p>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section-label">内容管理</div>
                <a href="#" class="nav-item active">
                    <span class="icon">📝</span>
                    <span>文章管理</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="icon">🖼️</span>
                    <span>媒体管理</span>
                </a>
                <div class="nav-section-label">站点设置</div>
                <a href="#" class="nav-item">
                    <span class="icon">🔗</span>
                    <span>链接管理</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="icon">⚙️</span>
                    <span>站点配置</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-secondary btn-sm" style="width:100%;justify-content:center;">退出登录</button>
            </div>
        </aside>

        <!-- 主内容 -->
        <div class="main-area">
            <div class="top-header">
                <span class="page-title">文章管理</span>
                <div class="header-actions">
                    <div class="search-box">
                        <input type="text" class="form-control" placeholder="搜索文章...">
                        <span class="search-icon">🔍</span>
                    </div>
                    <button class="btn btn-primary">+ 新建文章</button>
                </div>
            </div>

            <div class="content-area">
                <div class="card">
                    <!-- 搜索和筛选 -->
                    <div class="search-filter">
                        <div class="batch-actions">
                            <label><input type="checkbox" class="checkbox"> 全选</label>
                            <button class="btn btn-secondary btn-sm">批量删除</button>
                            <button class="btn btn-secondary btn-sm">批量移动</button>
                        </div>
                        <select class="form-select">
                            <option>全部分类</option>
                            <option>技术</option>
                            <option>生活</option>
                            <option>学习</option>
                        </select>
                        <select class="form-select">
                            <option>全部日期</option>
                            <option>最近7天</option>
                            <option>最近30天</option>
                            <option>今年</option>
                        </select>
                        <select class="form-select">
                            <option>按日期排序</option>
                            <option>按标题排序</option>
                            <option>按分类排序</option>
                        </select>
                    </div>

                    <!-- 表格 -->
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th><input type="checkbox" class="checkbox"></th>
                                    <th>标题</th>
                                    <th>日期</th>
                                    <th>分类</th>
                                    <th>标签</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td><input type="checkbox" class="checkbox"></td>
                                    <td><a href="#" style="font-weight:500;color:var(--text-primary);text-decoration:none;">如何利用Hexo搭建个人博客</a></td>
                                    <td style="color:var(--text-secondary);white-space:nowrap;">2024-01-01</td>
                                    <td><span class="badge badge-blue">技术</span></td>
                                    <td><span class="badge badge-gray">Hexo</span> <span class="badge badge-gray">博客</span></td>
                                    <td><span class="status-dot success"></span>已发布</td>
                                    <td class="td-actions">
                                        <button class="btn btn-secondary btn-sm">编辑</button>
                                        <button class="btn btn-danger btn-sm">删除</button>
                                    </td>
                                </tr>
                                <tr>
                                    <td><input type="checkbox" class="checkbox"></td>
                                    <td><a href="#" style="font-weight:500;color:var(--text-primary);text-decoration:none;">【软测入门】第1章 测试的基础知识</a></td>
                                    <td style="color:var(--text-secondary);white-space:nowrap;">2023-03-16</td>
                                    <td><span class="badge badge-blue">技术</span></td>
                                    <td><span class="badge badge-gray">软件测试</span> <span class="badge badge-gray">入门</span></td>
                                    <td><span class="status-dot success"></span>已发布</td>
                                    <td class="td-actions">
                                        <button class="btn btn-secondary btn-sm">编辑</button>
                                        <button class="btn btn-danger btn-sm">删除</button>
                                    </td>
                                </tr>
                                <tr>
                                    <td><input type="checkbox" class="checkbox"></td>
                                    <td><a href="#" style="font-weight:500;color:var(--text-primary);text-decoration:none;">【软测入门】第2章 测试过程</a></td>
                                    <td style="color:var(--text-secondary);white-space:nowrap;">2023-03-16</td>
                                    <td><span class="badge badge-blue">技术</span></td>
                                    <td><span class="badge badge-gray">软件测试</span> <span class="badge badge-gray">入门</span></td>
                                    <td><span class="status-dot success"></span>已发布</td>
                                    <td class="td-actions">
                                        <button class="btn btn-secondary btn-sm">编辑</button>
                                        <button class="btn btn-danger btn-sm">删除</button>
                                    </td>
                                </tr>
                                <tr>
                                    <td><input type="checkbox" class="checkbox"></td>
                                    <td><a href="#" style="font-weight:500;color:var(--text-primary);text-decoration:none;">欢迎使用DaydreamerBlog</a></td>
                                    <td style="color:var(--text-secondary);white-space:nowrap;">2024-01-01</td>
                                    <td><span class="badge badge-blue">生活</span></td>
                                    <td><span class="badge badge-gray">欢迎</span> <span class="badge badge-gray">介绍</span></td>
                                    <td><span class="status-dot warning"></span>草稿</td>
                                    <td class="td-actions">
                                        <button class="btn btn-secondary btn-sm">编辑</button>
                                        <button class="btn btn-danger btn-sm">删除</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- 分页 -->
                    <div class="pagination">
                        <span class="pagination-info">共 4 篇文章</span>
                        <button class="pagination-btn" disabled>上一页</button>
                        <button class="pagination-btn active">1</button>
                        <button class="pagination-btn" disabled>下一页</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
