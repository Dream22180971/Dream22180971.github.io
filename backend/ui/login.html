<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - Dreamers'Blog 管理后台</title>
  <style>
    :root {
      --sidebar-bg: #1e2a3a;
      --sidebar-text: #c8d6e5;
      --sidebar-hover: #2d3f55;
      --sidebar-active: #3498db;
      --sidebar-active-bg: rgba(52, 152, 219, 0.15);
      --header-bg: #ffffff;
      --header-border: #e8ecf0;
      --body-bg: #f4f6f9;
      --card-bg: #ffffff;
      --card-border: #e8ecf0;
      --text-primary: #2c3e50;
      --text-secondary: #7f8c8d;
      --accent: #3498db;
      --accent-hover: #2980b9;
      --danger: #e74c3c;
      --danger-hover: #c0392b;
      --success: #27ae60;
      --warning: #f39c12;
      --input-border: #dde3ea;
      --input-focus: #3498db;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; font-size: 14px; color: var(--text-primary); background: var(--body-bg); }
    
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
    }
    
    .auth-card {
      background: #fff;
      border-radius: 12px;
      padding: 40px;
      width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      border: 1px solid var(--card-border);
    }
    
    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .auth-logo h1 { font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
    .auth-logo p { color: var(--text-secondary); margin-top: 4px; font-size: 14px; }
    
    .form-group { margin-bottom: 16px; }
    
    label { display: block; margin-bottom: 6px; font-weight: 500; color: var(--text-primary); font-size: 13px; }
    
    .form-control {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--input-border);
      border-radius: 6px;
      font-size: 14px;
      color: var(--text-primary);
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }
    
    .form-control:focus {
      outline: none;
      border-color: var(--input-focus);
      box-shadow: 0 0 0 3px rgba(52,152,219,0.12);
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      transition: all 0.15s;
      line-height: 1;
    }
    
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    
    .alert {
      padding: 12px 16px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 14px;
      border: 1px solid transparent;
    }
    
    .alert-error { background: rgba(231,76,60,0.08); border-color: rgba(231,76,60,0.2); color: var(--danger); }
    .alert-success { background: rgba(39,174,96,0.08); border-color: rgba(39,174,96,0.2); color: var(--success); }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>Dreamers'Blog</h1>
      <p>管理后台</p>
    </div>

    <div id="msg"></div>

    <form id="login-form">
      <div class="form-group">
        <label>管理密码</label>
        <input type="password" id="password" class="form-control" placeholder="请输入密码" autofocus>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px;">
        登录
      </button>
    </form>
  </div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pw = document.getElementById('password').value;
  const msg = document.getElementById('msg');
  const btn = e.target.querySelector('button');

  btn.disabled = true;
  btn.textContent = '登录中...';

  try {
    const res = await fetch('/api/admin/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    const data = await res.json();
    if (res.ok) {
      window.location.href = '/admin/articles';
    } else {
      msg.innerHTML = `<div class="alert alert-error">${data.error}</div>`;
      btn.disabled = false;
      btn.textContent = '登录';
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  } catch (err) {
    msg.innerHTML = '<div class="alert alert-error">请求失败，请重试</div>';
    btn.disabled = false;
    btn.textContent = '登录';
  }
});
</script>
</body>
</html>
